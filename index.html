<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Valuation Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,700;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --border: #2a2a2a;
    --accent: #c8f562;
    --accent-dim: rgba(200, 245, 98, 0.12);
    --text: #f0ede8;
    --muted: #666;
    --red: #ff5e5e;
    --blue: #5eb8ff;
    --radius: 4px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .wrapper {
    width: 100%;
    max-width: 680px;
  }

  /* Header */
  .header {
    margin-bottom: 3rem;
  }
  .header .label {
    font-size: 0.68rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--text);
  }
  .header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  /* Toggle */
  .mode-toggle {
    display: flex;
    gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 4px;
    margin-bottom: 2rem;
    width: fit-content;
  }
  .mode-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: var(--accent);
    color: #0d0d0d;
    font-weight: 500;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
    margin-bottom: 1.5rem;
  }

  .field-group {
    display: grid;
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .field label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .input-row {
    display: flex;
    align-items: center;
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .input-row:focus-within {
    border-color: var(--accent);
  }

  .currency-prefix {
    background: #1e1e1e;
    border-right: 1px solid var(--border);
    padding: 0.75rem 1rem;
    font-size: 0.8rem;
    color: var(--muted);
    user-select: none;
  }

  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 1rem;
    padding: 0.75rem 1rem;
  }
  .input-row input::placeholder { color: #444; }

  .unit-select {
    background: #1e1e1e;
    border-left: 1px solid var(--border);
    border-right: none;
    border-top: none;
    border-bottom: none;
    outline: none;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.75rem 0.8rem;
    cursor: pointer;
    appearance: none;
  }

  /* Divider */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  /* Results */
  .results-label {
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .result-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.2rem 1.4rem;
    position: relative;
    transition: border-color 0.3s, transform 0.3s;
  }
  .result-box.highlight {
    border-color: var(--accent);
    background: var(--accent-dim);
  }
  .result-box .rb-label {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.4rem;
  }
  .result-box .rb-value {
    font-family: 'Fraunces', serif;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .result-box.highlight .rb-value {
    color: var(--accent);
  }
  .result-box .rb-sub {
    font-size: 0.65rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }
  .result-box .badge {
    position: absolute;
    top: 0.6rem;
    right: 0.7rem;
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--accent);
    color: #0d0d0d;
    padding: 2px 6px;
    border-radius: 2px;
    font-weight: 500;
  }

  /* Equity row */
  .equity-row {
    margin-top: 1rem;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.4rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
  }
  .equity-row .eq-label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .equity-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }
  .equity-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.22,1,.36,1);
    width: 0%;
  }
  .equity-pct {
    font-family: 'Fraunces', serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 60px;
    text-align: right;
  }

  /* Formula note */
  .formula-note {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    padding: 1rem 1.2rem;
    font-size: 0.75rem;
    color: var(--muted);
    line-height: 1.7;
  }
  .formula-note strong {
    color: var(--text);
    font-weight: 500;
  }
  .formula-note .formula {
    color: var(--accent);
    display: block;
    margin-top: 0.3rem;
    font-size: 0.8rem;
  }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--muted);
    font-size: 0.8rem;
    letter-spacing: 0.05em;
  }

  /* Animation */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .result-box, .equity-row {
    animation: fadeUp 0.35s ease both;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="header">
    <p class="label">Startup Finance</p>
    <h1>Valuation<br><em>Calculator</em></h1>
  </div>

  <!-- Mode toggle -->
  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="pre" onclick="setMode('pre')">I know the Pre-money</button>
    <button class="mode-btn" data-mode="post" onclick="setMode('post')">I know the Post-money</button>
  </div>

  <div class="card">
    <div class="field-group">

      <!-- Known valuation -->
      <div class="field">
        <label id="known-label">Pre-money Valuation</label>
        <div class="input-row">
          <span class="currency-prefix">$</span>
          <input type="number" id="known-val" placeholder="e.g. 4,000,000" min="0" oninput="calculate()">
          <select class="unit-select" id="known-unit" onchange="calculate()">
            <option value="1">—</option>
            <option value="1000">K</option>
            <option value="1000000" selected>M</option>
          </select>
        </div>
      </div>

      <!-- Round -->
      <div class="field">
        <label>Round Size</label>
        <div class="input-row">
          <span class="currency-prefix">$</span>
          <input type="number" id="round-val" placeholder="e.g. 1,000,000" min="0" oninput="calculate()">
          <select class="unit-select" id="round-unit" onchange="calculate()">
            <option value="1">—</option>
            <option value="1000">K</option>
            <option value="1000000" selected>M</option>
          </select>
        </div>
      </div>

    </div>

    <div class="divider"></div>

    <!-- Results -->
    <div id="results-section">
      <p class="empty-state">↑ Enter values to calculate</p>
    </div>
  </div>

  <!-- Formula note -->
  <div class="formula-note" id="formula-note">
    <strong>Active formula:</strong>
    <span class="formula" id="formula-display">Post-money = Pre-money + Round</span>
    <span id="formula-desc" style="display:block; margin-top:0.2rem;">Enter the pre-money valuation and round size to calculate the post-money and investor equity stake.</span>
  </div>
</div>

<script>
  let mode = 'pre'; // 'pre' → conosco pre-money | 'post' → conosco post-money

  function setMode(m) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
    document.getElementById('known-label').textContent = m === 'pre' ? 'Pre-money Valuation' : 'Post-money Valuation';
    // Update formula
    if (m === 'pre') {
      document.getElementById('formula-display').textContent = 'Post-money = Pre-money + Round';
      document.getElementById('formula-desc').textContent = 'Enter the pre-money valuation and round size to calculate the post-money and investor equity stake.';
    } else {
      document.getElementById('formula-display').textContent = 'Pre-money = Post-money − Round';
      document.getElementById('formula-desc').textContent = 'Enter the post-money valuation and round size to calculate the pre-money and investor equity stake.';
    }
    calculate();
  }

  function getVal(id, unitId) {
    const v = parseFloat(document.getElementById(id).value);
    const u = parseFloat(document.getElementById(unitId).value);
    if (isNaN(v) || v < 0) return null;
    return v * u;
  }

  function fmt(n) {
    if (n === null || isNaN(n)) return '—';
    if (n >= 1e9) return '$' + (n / 1e9).toFixed(2).replace(/\.?0+$/, '') + 'B';
    if (n >= 1e6) return '$' + (n / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
    if (n >= 1e3) return '$' + (n / 1e3).toFixed(1).replace(/\.?0+$/, '') + 'K';
    return '$' + n.toLocaleString('en-US');
  }

  function calculate() {
    const known = getVal('known-val', 'known-unit');
    const round = getVal('round-val', 'round-unit');
    const section = document.getElementById('results-section');

    if (known === null || round === null) {
      section.innerHTML = '<p class="empty-state">↑ Enter values to calculate</p>';
      return;
    }

    let pre, post;
    if (mode === 'pre') {
      pre = known;
      post = known + round;
    } else {
      post = known;
      pre = known - round;
    }

    if (pre < 0) {
      section.innerHTML = '<p class="empty-state" style="color:#ff5e5e">⚠ Round size exceeds post-money valuation</p>';
      return;
    }

    const pct = post > 0 ? (round / post) * 100 : 0;
    const founderPct = 100 - pct;

    section.innerHTML = `
      <p class="results-label">Results</p>
      <div class="results-grid">
        <div class="result-box ${mode === 'post' ? 'highlight' : ''}">
          ${mode === 'post' ? '<span class="badge">Calculated</span>' : ''}
          <p class="rb-label">Pre-money</p>
          <p class="rb-value">${fmt(pre)}</p>
          <p class="rb-sub">Value before the round</p>
        </div>
        <div class="result-box ${mode === 'pre' ? 'highlight' : ''}">
          ${mode === 'pre' ? '<span class="badge">Calculated</span>' : ''}
          <p class="rb-label">Post-money</p>
          <p class="rb-value">${fmt(post)}</p>
          <p class="rb-sub">Value after the round</p>
        </div>
      </div>
      <div class="equity-row">
        <span class="eq-label">% Investors</span>
        <div class="equity-bar-wrap"><div class="equity-bar" id="eq-bar"></div></div>
        <span class="equity-pct">${pct.toFixed(1)}%</span>
      </div>
      <div class="equity-row" style="margin-top:0.5rem">
        <span class="eq-label">% Founders</span>
        <div class="equity-bar-wrap"><div class="equity-bar" id="founder-bar" style="background:#5eb8ff"></div></div>
        <span class="equity-pct" style="color:#5eb8ff">${founderPct.toFixed(1)}%</span>
      </div>
    `;

    // Animate bars
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        const eb = document.getElementById('eq-bar');
        const fb = document.getElementById('founder-bar');
        if (eb) eb.style.width = Math.min(pct, 100) + '%';
        if (fb) fb.style.width = Math.min(founderPct, 100) + '%';
      });
    });
  }
</script>

</body>
</html>
